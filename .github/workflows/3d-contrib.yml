name: Generate 3D Contribution Graph

on:
  schedule:
    - cron: "0 1 * * *"   # diario 01:00 UTC
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Generate 3D contribution SVGs
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
        # Genera varias variantes en profile-3d-contrib/.
        # El README usa profile-night-green.svg (cambia a la que prefieras).

      - name: Commit & push the generated SVGs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A profile-3d-contrib
          git commit -m "chore: update 3d contribution graph" || echo "No changes"
          git push
