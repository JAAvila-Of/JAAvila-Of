name: Generate GitHub Metrics

on:
  schedule:
    - cron: "0 2 * * *"   # diario 02:00 UTC
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate metrics.svg
        uses: lowlighter/metrics@latest
        with:
          # token: un Personal Access Token (classic) con scope 'repo'.
          # Guárdalo como secret del repo: METRICS_TOKEN. Ver ../SETUP-WIDGETS.md
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          user: ${{ github.repository_owner }}
          template: classic
          base: header, activity, community, repositories, metadata

          # --- look terminal/verde + plugins de alto impacto ---
          config_timezone: America/Lima
          config_order: base.header, isocalendar, languages, activity, habits

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8

          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_facts: yes
          plugin_habits_charts: yes
