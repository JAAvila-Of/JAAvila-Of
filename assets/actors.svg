<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 230" width="820" height="230" font-family="'JetBrains Mono','Fira Code',Consolas,monospace" role="img" aria-label="BEAM actor processes passing messages, animated">
  <defs>
    <filter id="g2" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .node{fill:#161b22;stroke:#39d353;stroke-width:2;animation:breathe 3s ease-in-out infinite}
      .pid{font-size:12px;fill:#8b949e;font-weight:700}
      @keyframes breathe{0%,100%{stroke-opacity:.45}50%{stroke-opacity:1}}
      .d2{animation-delay:.4s}.d3{animation-delay:.8s}.d4{animation-delay:1.2s}
      .d5{animation-delay:1.6s}.d6{animation-delay:2s}.d7{animation-delay:2.4s}
    </style>
  </defs>

  <rect x="1" y="1" width="818" height="228" rx="12" fill="#0d1117" stroke="#30363d"/>
  <text x="24" y="36" font-size="16" font-weight="600"><tspan fill="#39d353">$ </tspan><tspan fill="#8b949e">ridge run </tspan><tspan fill="#e6edf3">server.ridge</tspan></text>

  <!-- edges -->
  <g stroke="#21262d" stroke-width="2">
    <line x1="84" y1="120" x2="250" y2="76"/><line x1="84" y1="120" x2="250" y2="170"/>
    <line x1="250" y1="76" x2="430" y2="120"/><line x1="250" y1="170" x2="430" y2="120"/>
    <line x1="430" y1="120" x2="606" y2="76"/><line x1="430" y1="120" x2="606" y2="170"/>
    <line x1="606" y1="76" x2="770" y2="120"/><line x1="606" y1="170" x2="770" y2="120"/>
  </g>

  <!-- messages (dots travelling along edges) -->
  <g fill="#39d353">
    <circle r="5" filter="url(#g2)"><animateMotion dur="2.2s" repeatCount="indefinite" begin="0s"   path="M84 120 L250 76"/></circle>
    <circle r="5" filter="url(#g2)"><animateMotion dur="2.2s" repeatCount="indefinite" begin="0.3s" path="M84 120 L250 170"/></circle>
    <circle r="5" fill="#bb9af7" filter="url(#g2)"><animateMotion dur="2.2s" repeatCount="indefinite" begin="0.7s" path="M250 76 L430 120"/></circle>
    <circle r="5" filter="url(#g2)"><animateMotion dur="2.2s" repeatCount="indefinite" begin="1s"   path="M250 170 L430 120"/></circle>
    <circle r="5" filter="url(#g2)"><animateMotion dur="2.2s" repeatCount="indefinite" begin="1.3s" path="M430 120 L606 76"/></circle>
    <circle r="5" fill="#bb9af7" filter="url(#g2)"><animateMotion dur="2.2s" repeatCount="indefinite" begin="1.6s" path="M430 120 L606 170"/></circle>
    <circle r="5" filter="url(#g2)"><animateMotion dur="2.2s" repeatCount="indefinite" begin="1.9s" path="M606 76 L770 120"/></circle>
    <circle r="5" filter="url(#g2)"><animateMotion dur="2.2s" repeatCount="indefinite" begin="2.2s" path="M606 170 L770 120"/></circle>
  </g>

  <!-- nodes -->
  <g>
    <circle class="node"    cx="84"  cy="120" r="24"/><text x="84"  y="124" text-anchor="middle" class="pid">P1</text>
    <circle class="node d2" cx="250" cy="76"  r="24"/><text x="250" y="80"  text-anchor="middle" class="pid">P2</text>
    <circle class="node d3" cx="250" cy="170" r="24"/><text x="250" y="174" text-anchor="middle" class="pid">P3</text>
    <circle class="node d4" cx="430" cy="120" r="26"/><text x="430" y="124" text-anchor="middle" class="pid">P4</text>
    <circle class="node d5" cx="606" cy="76"  r="24"/><text x="606" y="80"  text-anchor="middle" class="pid">P5</text>
    <circle class="node d6" cx="606" cy="170" r="24"/><text x="606" y="174" text-anchor="middle" class="pid">P6</text>
    <circle class="node d7" cx="770" cy="120" r="24"/><text x="770" y="124" text-anchor="middle" class="pid">P7</text>
  </g>

  <text x="24" y="210" font-size="12" fill="#8b949e">actor-first concurrency&#160;&#160;·&#160;&#160;lightweight BEAM processes passing messages</text>
</svg>
