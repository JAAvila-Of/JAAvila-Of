<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 230" width="820" height="230" font-family="'JetBrains Mono','Fira Code',Consolas,monospace" role="img" aria-label="The Ridge compiler pipeline, animated">
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .title{font-size:16px;font-weight:600}
      .bx{fill:#161b22;stroke:#30363d;stroke-width:2;rx:10}
      .nm{font-size:15px;font-weight:700;fill:#e6edf3}
      .sub{font-size:12px;fill:#8b949e}
      .packet{animation:move 6s linear infinite}
      @keyframes move{0%{transform:translateX(0)}100%{transform:translateX(760px)}}
      .b1{animation:p1 6s linear infinite}.b2{animation:p2 6s linear infinite}
      .b3{animation:p3 6s linear infinite}.b4{animation:p4 6s linear infinite}
      .b5{animation:p5 6s linear infinite}
      .s1{animation:l1 6s linear infinite}.s2{animation:l2 6s linear infinite}
      .s3{animation:l3 6s linear infinite}.s4{animation:l4 6s linear infinite}
      .s5{animation:l5 6s linear infinite}
      @keyframes p1{0%,4%{stroke:#30363d}8%{stroke:#39d353}13%,100%{stroke:#30363d}}
      @keyframes p2{0%,25%{stroke:#30363d}29%{stroke:#39d353}34%,100%{stroke:#30363d}}
      @keyframes p3{0%,46%{stroke:#30363d}50%{stroke:#39d353}55%,100%{stroke:#30363d}}
      @keyframes p4{0%,67%{stroke:#30363d}71%{stroke:#39d353}76%,100%{stroke:#30363d}}
      @keyframes p5{0%,88%{stroke:#30363d}92%{stroke:#39d353}97%,100%{stroke:#30363d}}
      @keyframes l1{0%,4%{fill:#8b949e}8%{fill:#39d353}13%,100%{fill:#8b949e}}
      @keyframes l2{0%,25%{fill:#8b949e}29%{fill:#39d353}34%,100%{fill:#8b949e}}
      @keyframes l3{0%,46%{fill:#8b949e}50%{fill:#39d353}55%,100%{fill:#8b949e}}
      @keyframes l4{0%,67%{fill:#8b949e}71%{fill:#39d353}76%,100%{fill:#8b949e}}
      @keyframes l5{0%,88%{fill:#8b949e}92%{fill:#bb9af7}97%,100%{fill:#8b949e}}
    </style>
  </defs>

  <rect x="1" y="1" width="818" height="228" rx="12" fill="#0d1117" stroke="#30363d"/>
  <text x="24" y="38" class="title"><tspan fill="#39d353">$ </tspan><tspan fill="#8b949e">ridge build </tspan><tspan fill="#e6edf3">hello.ridge</tspan></text>

  <!-- línea base -->
  <line x1="30" y1="136" x2="790" y2="136" stroke="#21262d" stroke-width="2"/>

  <!-- cajas -->
  <g>
    <rect class="bx b1" x="24"  y="104" width="130" height="64" rx="10"/>
    <text x="89"  y="130" text-anchor="middle" class="nm">source</text>
    <text x="89"  y="152" text-anchor="middle" class="sub s1">let x = 1+2</text>

    <rect class="bx b2" x="190" y="104" width="120" height="64" rx="10"/>
    <text x="250" y="130" text-anchor="middle" class="nm">lexer</text>
    <text x="250" y="152" text-anchor="middle" class="sub s2">tokens</text>

    <rect class="bx b3" x="346" y="104" width="120" height="64" rx="10"/>
    <text x="406" y="130" text-anchor="middle" class="nm">parser</text>
    <text x="406" y="152" text-anchor="middle" class="sub s3">AST</text>

    <rect class="bx b4" x="502" y="104" width="130" height="64" rx="10"/>
    <text x="567" y="130" text-anchor="middle" class="nm">typecheck</text>
    <text x="567" y="152" text-anchor="middle" class="sub s4">x : Int</text>

    <rect class="bx b5" x="668" y="104" width="128" height="64" rx="10"/>
    <text x="732" y="130" text-anchor="middle" class="nm">BEAM</text>
    <text x="732" y="152" text-anchor="middle" class="sub s5">Core Erlang</text>
  </g>

  <!-- flechas -->
  <g fill="#30363d">
    <path d="M158 136 l-8 -5 v10 z" transform="translate(8,0)"/>
    <path d="M314 136 l8 -5 v10 z" transform="translate(16,0)"/>
    <path d="M470 136 l8 -5 v10 z" transform="translate(16,0)"/>
    <path d="M636 136 l8 -5 v10 z" transform="translate(16,0)"/>
  </g>

  <!-- packet que viaja -->
  <g class="packet">
    <rect x="20" y="128" width="22" height="16" rx="5" fill="#39d353" filter="url(#glow)"/>
  </g>

  <text x="24" y="206" class="sub">lexer → parser → typecheck → codegen → BEAM&#160;&#160;·&#160;&#160;watch the compiler work</text>
</svg>
