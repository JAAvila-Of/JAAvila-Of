<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 290" width="720" height="290" font-family="'JetBrains Mono','Fira Code','Cascadia Code',Consolas,monospace" font-size="16" role="img" aria-label="Animated terminal: jose@ridge running the Ridge compiler">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <style>
      /* ── Reloj maestro: TODO dura 12s y se sincroniza por % para loop limpio ── */
      .screen   { animation: screen 12s ease-in-out infinite; }
      .cmd1     { clip-path: inset(0 100% 0 0); animation: t1   12s steps(6)  infinite; }
      .out1     { opacity: 0; animation: o1   12s infinite; }
      .cmd2     { clip-path: inset(0 100% 0 0); animation: t2   12s steps(21) infinite; }
      .out2     { opacity: 0; animation: o2   12s infinite; }
      .bar      { clip-path: inset(0 100% 0 0); animation: t3   12s steps(10) infinite; }
      .ok       { opacity: 0; animation: o2b  12s infinite; }
      .out3     { opacity: 0; animation: o3   12s infinite; }
      .promptF  { opacity: 0; animation: cw   12s infinite; }
      .cursor   { animation: blink 1.05s steps(1) infinite; }

      @keyframes screen { 0%{opacity:0} 3%{opacity:1} 96%{opacity:1} 100%{opacity:0} }
      @keyframes t1   { 0%,4%{clip-path:inset(0 100% 0 0)} 12%,100%{clip-path:inset(0 0 0 0)} }
      @keyframes o1   { 0%,14%{opacity:0} 16%,100%{opacity:1} }
      @keyframes t2   { 0%,22%{clip-path:inset(0 100% 0 0)} 34%,100%{clip-path:inset(0 0 0 0)} }
      @keyframes o2   { 0%,36%{opacity:0} 38%,100%{opacity:1} }
      @keyframes t3   { 0%,39%{clip-path:inset(0 100% 0 0)} 50%,100%{clip-path:inset(0 0 0 0)} }
      @keyframes o2b  { 0%,51%{opacity:0} 53%,100%{opacity:1} }
      @keyframes o3   { 0%,57%{opacity:0} 60%,100%{opacity:1} }
      @keyframes cw   { 0%,66%{opacity:0} 68%,100%{opacity:1} }
      @keyframes blink{ 0%,50%{opacity:1} 51%,100%{opacity:0} }
    </style>
  </defs>

  <!-- ventana -->
  <rect x="6" y="6" width="708" height="278" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <!-- barra de título -->
  <path d="M6 18 a12 12 0 0 1 12 -12 h684 a12 12 0 0 1 12 12 v22 h-708 z" fill="#161b22"/>
  <circle cx="26" cy="22" r="6" fill="#ff5f56"/>
  <circle cx="48" cy="22" r="6" fill="#ffbd2e"/>
  <circle cx="70" cy="22" r="6" fill="#27c93f"/>
  <text x="360" y="27" text-anchor="middle" fill="#8b949e" font-size="13">jose@ridge: ~/profile</text>

  <!-- cuerpo -->
  <g class="screen">
    <!-- L1: $ whoami -->
    <text x="22" y="82" fill="#39d353">$</text>
    <g class="cmd1"><text x="40" y="82" fill="#e6edf3">whoami</text></g>

    <!-- out1 -->
    <text class="out1" x="22" y="110" xml:space="preserve"><tspan fill="#e6edf3">Jose Angel Avila</tspan><tspan fill="#8b949e">  ·  language designer</tspan></text>

    <!-- L2: $ ridge run hello.ridge -->
    <text x="22" y="142" fill="#39d353">$</text>
    <g class="cmd2"><text x="40" y="142" fill="#e6edf3">ridge run hello.ridge</text></g>

    <!-- out2: compiling + barra + ok -->
    <text class="out2" x="22" y="170" fill="#8b949e">compiling</text>
    <text x="118" y="170" fill="#30363d">[</text>
    <g class="bar"><text x="128" y="170" fill="#39d353" letter-spacing="1">██████████</text></g>
    <text x="248" y="170" fill="#30363d">]</text>
    <text class="ok" x="266" y="170" xml:space="preserve"><tspan fill="#39d353">ok</tspan><tspan fill="#8b949e">  ·  target </tspan><tspan fill="#bb9af7">BEAM</tspan></text>

    <!-- out3 -->
    <text class="out3" x="22" y="198" fill="#39d353">Hello from the BEAM!</text>

    <!-- L3: prompt final + cursor -->
    <g class="promptF">
      <text x="22" y="232" fill="#39d353">$</text>
      <rect class="cursor" x="40" y="218" width="11" height="19" fill="#39d353"/>
    </g>
  </g>
</svg>
